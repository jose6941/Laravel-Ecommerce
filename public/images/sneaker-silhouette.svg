<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="40%" style="stop-color:#b91c1c"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <linearGradient id="soleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="heelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5"/>
      <stop offset="100%" style="stop-color:#fef2f2;stop-opacity:0.6"/>
    </linearGradient>
    <radialGradient id="shadowGrad" cx="50%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="4" dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="420" cy="540" rx="280" ry="25" fill="url(#shadowGrad)"/>

  <!-- Sole / Outsole -->
  <g filter="url(#dropShadow)">
    <!-- Main Sole -->
    <path d="M130,470 L140,485 Q160,510 200,515 L240,518 Q300,522 400,520 L520,518 Q580,516 620,510 Q660,500 670,480 L675,470 Z"
          fill="url(#soleGrad)" stroke="#111" stroke-width="1"/>

    <!-- Sole Texture Lines -->
    <path d="M160,490 Q200,500 280,502 Q360,504 440,500 Q520,496 580,490 Q620,484 650,475"
          fill="none" stroke="#333" stroke-width="1.5" opacity="0.6"/>
    <path d="M180,500 Q240,508 320,510 Q400,512 480,508 Q540,504 600,496 Q630,490 650,482"
          fill="none" stroke="#222" stroke-width="1" opacity="0.5"/>

    <!-- Sole Tread Details -->
    <line x1="200" y1="515" x2="200" y2="510" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="250" y1="518" x2="250" y2="512" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="300" y1="520" x2="300" y2="513" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="350" y1="520" x2="350" y2="513" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="400" y1="520" x2="400" y2="513" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="450" y1="518" x2="450" y2="511" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="500" y1="516" x2="500" y2="509" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="550" y1="512" x2="550" y2="506" stroke="#444" stroke-width="1" opacity="0.5"/>
    <line x1="600" y1="506" x2="600" y2="500" stroke="#444" stroke-width="1" opacity="0.5"/>

    <!-- Midsole -->
    <path d="M140,465 L145,475 Q165,495 210,500 L260,505 Q320,508 420,506 L520,504 Q580,500 620,494 Q655,486 665,470 L660,460 Z"
          fill="#2a2a2a" stroke="#222" stroke-width="0.5"/>

    <!-- Midsole accent stripe -->
    <path d="M145,470 Q165,490 210,495 L260,500 Q320,503 420,501 L520,499 Q580,495 618,489 Q650,482 660,468"
          fill="none" stroke="#ef4444" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Shoe Body / Upper -->
  <g filter="url(#dropShadow)">
    <!-- Main Body -->
    <path d="M130,440
             Q120,400 130,350
             Q135,320 150,295
             Q170,260 210,240
             Q240,226 280,220
             Q320,214 370,215
             Q420,216 470,228
             Q510,238 540,255
             Q570,270 595,290
             Q620,310 640,335
             Q655,355 665,380
             Q670,400 668,430
             Q665,460 660,470
             L650,465
             Q620,480 580,488
             L520,492
             L400,490
             Q260,488 200,480
             Q160,472 145,465
             Z"
          fill="url(#bodyGrad)" stroke="#991b1b" stroke-width="1"/>

    <!-- Toe Cap -->
    <path d="M130,440
             Q120,400 130,350
             Q135,320 150,295
             Q170,260 210,240
             Q220,235 230,240
             Q240,250 245,268
             Q250,290 248,320
             Q245,350 240,380
             Q235,410 230,440
             Q220,450 200,455
             Q170,460 145,465
             Z"
          fill="#991b1b" stroke="#7f1d1d" stroke-width="0.5"/>

    <!-- Vamp / Upper front -->
    <path d="M230,240
             Q260,225 300,218
             Q340,212 380,214
             Q410,216 440,224
             Q460,232 475,245
             Q460,260 440,275
             Q400,295 360,300
             Q320,305 280,298
             Q250,290 240,270
             Q235,255 230,240
             Z"
          fill="#b91c1c" stroke="#991b1b" stroke-width="0.5"/>

    <!-- Tongue / Collar visible -->
    <path d="M280,220
             Q290,195 310,180
             Q330,168 350,165
             Q340,175 335,190
             Q330,205 320,218
             Z"
          fill="#dc2626" stroke="#991b1b" stroke-width="0.5"/>

    <!-- Heel Counter -->
    <path d="M540,255
             Q570,270 595,290
             Q620,310 640,335
             Q655,355 665,380
             Q665,390 660,395
             Q640,370 615,350
             Q585,328 555,310
             Q535,298 520,290
             Q525,275 535,262
             Z"
          fill="#7f1d1d" stroke="#6b1a1a" stroke-width="0.5"/>

    <!-- Ankle Collar -->
    <path d="M370,215
             Q400,210 440,215
             Q480,222 515,240
             Q535,250 540,260
             Q530,245 500,232
             Q470,222 435,218
             Q400,216 370,215
             Z"
          fill="#2d2d2d" stroke="#1a1a1a" stroke-width="0.5"/>

    <!-- Swoosh / Logo Stripe -->
    <path d="M400,290
             Q440,275 480,278
             Q520,282 560,300
             Q580,312 590,330
             Q580,320 560,310
             Q520,295 480,290
             Q440,286 400,295
             Q380,300 365,310
             Q370,300 385,293
             Z"
          fill="url(#swooshGrad)" opacity="0.7"/>

    <!-- Dynamic Speed Lines -->
    <path d="M420,295 Q450,288 490,290" fill="none" stroke="#fca5a5" stroke-width="1.5" opacity="0.4"/>
    <path d="M430,305 Q460,300 500,303" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.3"/>
    <path d="M415,285 Q440,278 470,280" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.3"/>

    <!-- Lace Eyelets -->
    <circle cx="290" cy="240" r="3" fill="#1a1a1a" stroke="#111" stroke-width="0.5"/>
    <circle cx="310" cy="232" r="3" fill="#1a1a1a" stroke="#111" stroke-width="0.5"/>
    <circle cx="330" cy="228" r="3" fill="#1a1a1a" stroke="#111" stroke-width="0.5"/>
    <circle cx="350" cy="226" r="3" fill="#1a1a1a" stroke="#111" stroke-width="0.5"/>
    <circle cx="370" cy="225" r="3" fill="#1a1a1a" stroke="#111" stroke-width="0.5"/>

    <!-- Laces -->
    <path d="M290,240 Q300,225 310,232" fill="none" stroke="#eee" stroke-width="1.5" opacity="0.6"/>
    <path d="M310,232 Q320,218 330,228" fill="none" stroke="#eee" stroke-width="1.5" opacity="0.6"/>
    <path d="M330,228 Q340,215 350,226" fill="none" stroke="#eee" stroke-width="1.5" opacity="0.6"/>
    <path d="M350,226 Q360,214 370,225" fill="none" stroke="#eee" stroke-width="1.5" opacity="0.6"/>

    <!-- Mesh Texture Pattern -->
    <g opacity="0.15" fill="none" stroke="#000" stroke-width="0.5">
      <circle cx="280" cy="280" r="4"/>
      <circle cx="295" cy="275" r="4"/>
      <circle cx="310" cy="272" r="4"/>
      <circle cx="325" cy="270" r="4"/>
      <circle cx="340" cy="270" r="4"/>
      <circle cx="355" cy="272" r="4"/>

      <circle cx="280" cy="300" r="4"/>
      <circle cx="295" cy="295" r="4"/>
      <circle cx="310" cy="292" r="4"/>
      <circle cx="325" cy="290" r="4"/>
      <circle cx="340" cy="290" r="4"/>
      <circle cx="355" cy="292" r="4"/>

      <circle cx="285" cy="320" r="4"/>
      <circle cx="300" cy="318" r="4"/>
      <circle cx="315" cy="316" r="4"/>
      <circle cx="330" cy="315" r="4"/>
      <circle cx="345" cy="316" r="4"/>

      <circle cx="500" cy="300" r="4"/>
      <circle cx="515" cy="305" r="4"/>
      <circle cx="530" cy="312" r="4"/>
      <circle cx="545" cy="320" r="4"/>

      <circle cx="500" cy="325" r="4"/>
      <circle cx="515" cy="330" r="4"/>
      <circle cx="530" cy="338" r="4"/>
    </g>

    <!-- Highlight / Shine -->
    <path d="M200,280
             Q220,250 250,235
             Q230,260 215,290
             Q205,310 200,330
             Q195,310 198,295
             Z"
          fill="#fff" opacity="0.12"/>

    <path d="M520,270
             Q540,280 555,295
             Q545,285 530,278
             Q520,274 515,272
             Z"
          fill="#fff" opacity="0.08"/>
  </g>

  <!-- Inner outline for definition -->
  <path d="M130,440
           Q120,400 130,350
           Q135,320 150,295
           Q170,260 210,240
           Q240,226 280,220
           Q320,214 370,215
           Q420,216 470,228
           Q510,238 540,255
           Q570,270 595,290
           Q620,310 640,335
           Q655,355 665,380
           Q670,400 668,430
           Q665,460 660,470
           L650,465
           Q620,480 580,488
           L520,492
           L400,490
           Q260,488 200,480
           Q160,472 145,465
           Z"
        fill="none" stroke="#7f1d1d" stroke-width="1.5" opacity="0.5"/>
</svg>
